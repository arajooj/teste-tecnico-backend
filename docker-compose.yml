services:
  lambda-builder:
    build:
      context: .
      dockerfile: ./lambda/Dockerfile
    container_name: teste-tecnico-lambda-builder
    volumes:
      - ./:/workspace

  # ──────────────────────────────────────────────
  # PostgreSQL — Banco de dados principal
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teste-tecnico-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teste_tecnico
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ──────────────────────────────────────────────
  # LocalStack — Simula AWS SQS e Lambda
  # ──────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.0
    container_name: teste-tecnico-localstack
    depends_on:
      lambda-builder:
        condition: service_completed_successfully
    environment:
      SERVICES: sqs,lambda,s3
      DEFAULT_REGION: us-east-1
      DOCKER_HOST: unix:///var/run/docker.sock
      MAIN_DOCKER_NETWORK: teste-tecnico-backend-network
      LAMBDA_EVENT_SOURCE_MAPPING: v2
      LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT: 60
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
      - ./lambda/dist:/opt/code/lambda
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Mock Bank Server — API bancária simulada
  # ──────────────────────────────────────────────
  mock-bank:
    build:
      context: ./mock-bank-server
    container_name: teste-tecnico-mock-bank
    environment:
      WEBHOOK_CALLBACK_URL: "http://host.docker.internal:8000/api/webhooks/bank-callback"
      PROCESSING_DELAY_MIN: "2"
      PROCESSING_DELAY_MAX: "5"
      ERROR_RATE: "0.1"
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
    name: teste-tecnico-backend-network
